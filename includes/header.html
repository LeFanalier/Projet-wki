<!-- includes/header.html -->
<header class="fixed top-0 left-0 right-0 z-[60] bg-background/80 backdrop-blur-xl border-b border-primary/20">
    <div class="flex justify-between items-center w-full px-8 py-4 max-w-full">
        
        <!-- LOGO DE LA GUILDE -->
        <div class="text-2xl font-black tracking-tighter text-primary drop-shadow-[0_0_10px_rgba(0,229,255,0.4)] font-['Space_Grotesk'] uppercase">
            KAYOU
        </div>
        
        <!-- MENU DE NAVIGATION CENTRAL -->
        <nav id="main-nav" class="hidden md:flex items-center gap-10 font-['Space_Grotesk'] uppercase tracking-[0.2em] text-xs font-bold">
            <!-- Les liens sont gérés dynamiquement pour adapter les chemins -->
            <a class="nav-link text-on-surface/50 hover:text-primary transition-colors" href="index.html" data-page="index">CARTE</a>
            <a class="nav-link text-on-surface/50 hover:text-primary transition-colors" href="pages/stuff.html" data-page="stuff">PROFIL</a>
            <a class="nav-link text-on-surface/50 hover:text-primary transition-colors" href="pages/encyclopedie.html" data-page="encyclopedie">QUÊTES</a>
        </nav>
        
        <!-- MODULE DE DROITE (PARAMÈTRES & CONNEXION) -->
        <div class="flex items-center gap-4">
            <!-- Boutons utilitaires standards -->
            <button class="material-symbols-outlined text-primary hover:bg-primary/10 transition-all duration-300 p-2 rounded-full cursor-pointer">settings</button>
            <button class="material-symbols-outlined text-primary hover:bg-primary/10 transition-all duration-300 p-2 rounded-full cursor-pointer">notifications</button>
            
            <!-- Bouton Connexion Discord (masqué par défaut, affiché si déconnecté) -->
            <button id="login-btn" class="flex items-center gap-2 px-3 py-1.5 border border-[#a3855b]/20 bg-black/40 text-[#d2c1a0] hover:text-white hover:border-[#a3855b] hover:bg-[#a3855b]/10 transition-all font-['Cinzel'] text-[9px] tracking-widest uppercase rounded cursor-pointer" style="display: none;">
                <!-- Icône SVG Discord -->
                <svg class="w-4 h-4 fill-current" viewBox="0 0 127.14 96.36">

                </svg>
                <span>Se connecter</span>
            </button>

            <!-- Profil Joueur connecté (masqué par défaut, affiché si connecté) -->
            <div id="user-profile" class="flex items-center gap-3" style="display: none;">
                <!-- Pseudo Discord du joueur -->
                <span id="user-name" class="font-['Cinzel'] text-[10px] tracking-wider text-[#d2c1a0] font-bold">Pseudo</span>
                
                <!-- Avatar hexagonal interactif (cliquer déconnecte) -->
                <button id="logout-btn" class="w-10 h-10 hexagon-clip bg-primary/20 p-[1px] cursor-pointer hover:scale-105 transition-all" title="Se déconnecter">
                    <div class="w-full h-full hexagon-clip bg-surface-container overflow-hidden">
                        <img id="user-avatar" alt="Player Portrait" class="w-full h-full object-cover" src=""/>
                    </div>
                </button>
            </div>
        </div>
        
    </div>
</header>
