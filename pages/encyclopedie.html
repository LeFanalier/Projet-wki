<!DOCTYPE html>
<html class="dark" lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KAYOU - ENCYCLOPÉDIE (AJOUT D'ITEM)</title>
    
    <!-- Scripts Externes -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Polices et Icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- CSS Local -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-background text-on-background font-body-base min-h-screen flex flex-col">

<div id="header-placeholder"></div>

<main class="flex-grow pt-24 pb-12 px-8 max-w-6xl mx-auto w-full">
    
    <!-- Titre de la page -->
    <div class="flex items-center gap-4 mb-10">
        <span class="w-1 h-10 bg-primary shadow-[0_0_15px_cyan]"></span>
        <div>
            <h1 class="text-3xl font-black tracking-tighter uppercase font-['Space_Grotesk'] text-primary">Forge de l'Encyclopédie</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-40">Ajouter un nouvel équipement à la base de données</p>
        </div>
    </div>

    <form id="add-item-form" class="space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- SECTION 1 : IDENTITÉ & IMAGE -->
            <div class="glass-panel p-6 space-y-6">
                <h2 class="text-primary font-bold uppercase text-xs tracking-widest border-b border-primary/20 pb-2 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">badge</span> Identité de l'item
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] uppercase font-bold text-primary/60 mb-1">Nom de l'item</label>
                        <input type="text" id="nom" class="w-full bg-surface-container border border-primary/20 p-2 text-sm focus:border-primary outline-none transition-colors" placeholder="ex: Masque du Nécromancien" required>
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-primary/60 mb-1">Emplacement (Slot)</label>
                        <select id="emplacement" class="w-full bg-surface-container border border-primary/20 p-2 text-sm outline-none focus:border-primary">
                            <option value="casque">Casque</option>
                            <option value="plastron">Plastron</option>
                            <option value="gants">Gants</option>
                            <option value="jambieres">Jambières</option>
                            <option value="bottes">Bottes</option>
                            <option value="amulette">Amulette</option>
                            <option value="bracelet">Bracelet</option>
                            <option value="anneau">Anneau</option>
                            <option value="secondaire">Main Secondaire</option>
                            <option value="artefact">Artéfact</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-primary/60 mb-1">Rareté</label>
                        <select id="rarete" class="w-full bg-surface-container border border-primary/20 p-2 text-sm outline-none focus:border-primary">
                            <option value="COMMUN">Commun</option>
                            <option value="RARE">Rare</option>
                            <option value="ÉPIQUE">Épique</option>
                            <option value="LÉGENDAIRE" selected>Légendaire</option>
                        </select>
                    </div>
                    <div class="col-span-2">
                        <label class="block text-[10px] uppercase font-bold text-primary/60 mb-1">URL de l'image</label>
                        <input type="url" id="image_url" class="w-full bg-surface-container border border-primary/20 p-2 text-sm focus:border-primary outline-none" placeholder="Lien direct Discord, Imgur..." required>
                    </div>
                </div>
            </div>

            <!-- SECTION 2 : RESTRICTIONS (VÉRIFICATION DE BUILD) -->
            <div class="glass-panel p-6 space-y-6 border-l-2 border-error/40">
                <h2 class="text-error font-bold uppercase text-xs tracking-widest border-b border-error/20 pb-2 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">lock</span> Restrictions de port
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] uppercase font-bold text-error/60 mb-1">Niveau Minimum</label>
                        <input type="number" id="req_lvl" class="w-full bg-surface-container border border-error/10 p-2 text-sm outline-none focus:border-error" value="1">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-error/60 mb-1">Force Requise</label>
                        <input type="number" id="req_force" class="w-full bg-surface-container border border-error/10 p-2 text-sm outline-none focus:border-error" value="0">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-error/60 mb-1">Intelligence Requise</label>
                        <input type="number" id="req_int" class="w-full bg-surface-container border border-error/10 p-2 text-sm outline-none focus:border-error" value="0">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-error/60 mb-1">Dextérité Requise</label>
                        <input type="number" id="req_dex" class="w-full bg-surface-container border border-error/10 p-2 text-sm outline-none focus:border-error" value="0">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-error/60 mb-1">Esprit Requis</label>
                        <input type="number" id="req_esp" class="w-full bg-surface-container border border-error/10 p-2 text-sm outline-none focus:border-error" value="0">
                    </div>
                </div>
            </div>

            <!-- SECTION 3 : STATISTIQUES (LA GRILLE) -->
            <div class="md:col-span-2 glass-panel p-6 space-y-6">
                <h2 class="text-primary font-bold uppercase text-xs tracking-widest border-b border-primary/20 pb-2 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">equalizer</span> Statistiques de l'item
                </h2>
                
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
                    <!-- Groupe Offensif -->
                    <div class="space-y-3">
                        <p class="text-[9px] font-black text-primary/40 uppercase">Offensif</p>
                        <input type="number" id="stat-deg_att" placeholder="Dégâts Att." class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                        <input type="number" id="stat-deg_mag" placeholder="Dégâts Mag." class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                        <input type="number" id="stat-crit_chance" placeholder="% Critique" class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                    </div>
                    <!-- Groupe Défensif -->
                    <div class="space-y-3">
                        <p class="text-[9px] font-black text-primary/40 uppercase">Défensif</p>
                        <input type="number" id="stat-def" placeholder="Défense" class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                        <input type="number" id="stat-esquive" placeholder="% Esquive" class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                        <input type="number" id="stat-red_dmg" placeholder="% Réduc Dég." class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                    </div>
                    <!-- Groupe Vitalité -->
                    <div class="space-y-3">
                        <p class="text-[9px] font-black text-primary/40 uppercase">Vitalité</p>
                        <input type="number" id="stat-hp" placeholder="Santé (HP)" class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                        <input type="number" id="stat-mana" placeholder="Mana" class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                        <input type="number" id="stat-stamina" placeholder="Stamina" class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                    </div>
                    <!-- Groupe Mouvement -->
                    <div class="space-y-3">
                        <p class="text-[9px] font-black text-primary/40 uppercase">Spécial</p>
                        <input type="number" id="stat-speed" placeholder="Vitesse" class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                        <input type="number" id="stat-cdr" placeholder="% Cooldown" class="w-full bg-surface-container border border-primary/10 p-1.5 text-xs outline-none">
                    </div>
                </div>
            </div>

            <!-- SECTION 4 : SYSTÈME DE SET -->
            <div class="md:col-span-2 glass-panel p-6 space-y-6 border-l-2 border-secondary/40">
                <h2 class="text-secondary font-bold uppercase text-xs tracking-widest border-b border-secondary/20 pb-2 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">Electric_bolt</span> Bonus de Set (Cumulatif)
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="md:col-span-1">
                        <label class="block text-[10px] uppercase font-bold text-secondary/60 mb-1">Nom du Set</label>
                        <input type="text" id="nom_set" class="w-full bg-surface-container border border-secondary/20 p-2 text-sm outline-none focus:border-secondary" placeholder="ex: Givre">
                    </div>
                    <div class="md:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase font-bold opacity-40 mb-1">Bonus (2 pièces)</label>
                            <input type="text" id="set_bonus_2" class="w-full bg-surface-container border border-secondary/10 p-2 text-[10px] outline-none" placeholder="ex: +10% CDR">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold opacity-40 mb-1">Bonus (3 pièces)</label>
                            <input type="text" id="set_bonus_3" class="w-full bg-surface-container border border-secondary/10 p-2 text-[10px] outline-none" placeholder="ex: +5 Vitesse">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold opacity-40 mb-1">Bonus (4 pièces)</label>
                            <input type="text" id="set_bonus_4" class="w-full bg-surface-container border border-secondary/10 p-2 text-[10px] outline-none" placeholder="ex: +20% Esquive">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VALIDATION FINALE -->
        <div class="glass-panel p-8 text-center space-y-6 border-t-4 border-primary">
            <div>
                <p class="text-[11px] font-black uppercase tracking-[0.4em] text-primary mb-4">Authentification de Sécurité</p>
                <input type="password" id="secret_code" class="bg-surface-container border border-primary/30 p-4 text-center tracking-[1em] text-xl font-bold outline-none focus:border-primary w-full max-w-sm mx-auto block" placeholder="••••">
            </div>
            <button type="submit" class="w-full max-w-md mx-auto py-5 bg-primary text-background font-black text-sm uppercase tracking-[0.2em] hover:bg-white hover:shadow-[0_0_30px_cyan] transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined">publish</span>
                Enregistrer dans la Base de Données
            </button>
        </div>

    </form>
</main>

<div id="footer-placeholder"></div>

<!-- Scripts Modulaires -->
<!-- À mettre tout en bas, avant </body> -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/encyclopedia.js"></script>

</body>
</html>
